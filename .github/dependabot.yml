version: 2

# Keep the GitHub Actions used by this repo's workflows up to date. The
# runtime itself is stdlib-only (no pip/npm ecosystem to track), so the only
# dependency surface worth automating is the `uses:` action versions.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"
