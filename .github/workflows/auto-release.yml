name: Auto Release

# On every merge to `main`, cut a SemVer release automatically:
#   1. Derive the bump (major/minor/patch) from the Conventional Commits
#      since the last tag.
#   2. Create and push the new `vX.Y.Z` tag.
#   3. Move the major-version alias tag (e.g. `v1`) to the new release so
#      consumers pinning `@v1` pick it up — the standard Marketplace pattern.
#   4. Publish a GitHub Release with auto-generated notes.
#
# Mirrors the DailyBot `auto-release` convention (see the agent-skill repo),
# adapted for a Marketplace-published composite action: there is no npm
# publish or build artefact — the "package" is the tagged source itself.
#
# Bootstrapping: the very first release (v1.0.0) is cut MANUALLY so it can be
# published to the GitHub Marketplace from the Release UI. This workflow skips
# while no tag exists yet, then takes over for every release after that.

on:
  push:
    branches: [main]

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  auto-release:
    name: 'Auto Release on Merge to Main'
    runs-on: ubuntu-latest
    # Skip release-bookkeeping commits and explicit opt-outs.
    if: >-
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !contains(github.event.head_commit.message, '[skip release]')
    steps:
      - name: Step 0 - 📥 Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTOMATION_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Step 1 - ⚙️ Configure Git
        run: |
          git config user.name "🤖 DailyBot"
          git config user.email "ops@dailybot.com"

      - name: Step 2 - 📝 Determine version bump from commits
        id: version
        run: |
          set -euo pipefail
          # Use the highest SemVer RELEASE tag (vX.Y.Z), NOT
          # `git describe --tags --abbrev=0`. `describe` walks by ancestry and
          # returns the most recent reachable tag — which, once the moving `v1`
          # major-alias tag is force-moved onto the latest release commit, is
          # `v1` itself. That parses as MAJOR=1, MINOR="" (→0) and a minor bump
          # produces the already-existing `v1.1.0` (fatal: tag already exists).
          # Filtering to exact `vMAJOR.MINOR.PATCH` and version-sorting ignores
          # the `v1`/`v2` aliases and any pre-release/suffix tags.
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tag found. The first release (v1.0.0) must be cut"
            echo "manually so it can be published to the Marketplace from the"
            echo "Release UI. Skipping auto-release until a base tag exists."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Latest tag: $LATEST_TAG"

          CURRENT_VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || echo "")
          echo "Commits since $LATEST_TAG:"
          echo "$COMMITS"

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG — nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Conventional-commit → bump mapping.
          BUMP="patch"
          if echo "$COMMITS" | grep -qE "^(feat|feature|fix|perf|refactor)(\(.+\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^(feat|feature)(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^(fix|perf)(\(.+\))?:"; then
            BUMP="patch"
          fi
          echo "Bump type: $BUMP"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          MAJOR_TAG="v${MAJOR}"
          echo "New version: $NEW_VERSION (major alias: $MAJOR_TAG)"
          {
            echo "skip=false"
            echo "new_version=$NEW_VERSION"
            echo "major_tag=$MAJOR_TAG"
            echo "previous_tag=$LATEST_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Step 2.5 - 📦 Sync skill artifacts to the new version
        # The action ships `prompts/default.md`; the local companion skill
        # (`skills/ai-diff-reviewer/`) ships its own byte-copy alongside a
        # `version:` frontmatter field that must equal the action tag for
        # `npx skills update` to detect a new release. This step keeps
        # both invariants (byte-copy identical + version equal) true at
        # every tag. The resulting `chore(release):` commit uses the
        # `[skip release]` marker so this workflow does NOT re-trigger on
        # its own push (the guard on the job's `if:` catches it).
        id: skill_sync
        if: steps.version.outputs.skip == 'false'
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          VERSION_NO_V="${NEW_VERSION#v}"

          # Bump `version:` in every SKILL.md under skills/ (today: only
          # ai-diff-reviewer; loop makes it work when future sibling skills land).
          while IFS= read -r f; do
            sed -i "s/^version: \".*\"/version: \"${VERSION_NO_V}\"/" "$f"
          done < <(find skills -name 'SKILL.md')

          # Byte-copy the shipped prompt so the vendored skill stays
          # self-contained (Open Agent Skills convention).
          cp prompts/default.md skills/ai-diff-reviewer/prompt.md

          if git diff --quiet -- skills/; then
            echo "Skill artifacts already in sync with ${NEW_VERSION}; nothing to commit."
            echo "has_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add skills/
          git commit -m "chore(release): sync skill artifacts for ${NEW_VERSION} [skip release]"
          echo "has_commit=true" >> "$GITHUB_OUTPUT"

      - name: Step 3 - 🏷️ Create and push tags
        if: steps.version.outputs.skip == 'false'
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          MAJOR_TAG="${{ steps.version.outputs.major_tag }}"
          HAS_SYNC_COMMIT="${{ steps.skill_sync.outputs.has_commit }}"

          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"

          # When Step 2.5 produced a `chore(release):` commit, push it to
          # main alongside the tag via `--follow-tags` (annotated tags
          # reachable from the pushed ref go with it). When no commit was
          # produced, just push the tag on its own — HEAD equals origin/main
          # in that case and a branch push would be a no-op error.
          if [ "$HAS_SYNC_COMMIT" = "true" ]; then
            git push origin HEAD:main --follow-tags
          else
            git push origin "$NEW_VERSION"
          fi

          # Move the major alias tag — `--force` is correct: it's a moving
          # pointer by design so `@v1` tracks the latest v1.x.y.
          git tag -f "$MAJOR_TAG" "$NEW_VERSION"
          git push origin "$MAJOR_TAG" --force

      - name: Step 3.5 - 🍽️ Dogfood — refresh the vendored ai-diff-reviewer skill
        # This repo dogfoods its own skill: `.agents/skills/ai-diff-reviewer/`
        # is a vendored copy pinned via `skills-lock.json`, installed exactly
        # the way any consumer would install it (`npx skills add`). Refreshing
        # right after we publish the new tag serves three purposes:
        #   1. Live smoke-test — proves the just-published tag actually
        #      installs cleanly via `npx skills`. If the install script or
        #      the tag layout is broken, the workflow fails HERE (loudly)
        #      instead of a consumer discovering it silently the next day.
        #   2. Keeps the vendored copy at HEAD equal to the latest release
        #      (rather than the release before the one we just cut), so any
        #      contributor cloning fresh gets the current skill by default.
        #   3. Refreshes `skills-lock.json` with the new content hash so
        #      restore/verify flows stay accurate.
        # Uses `[skip release]` in the commit message so this push does NOT
        # re-trigger the auto-release job.
        if: steps.version.outputs.skip == 'false'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          set -euo pipefail

          # Give GitHub a moment to propagate the just-pushed tag through the
          # API (git tag list on the git protocol is instant; the REST/graphql
          # surface backing `npx skills` occasionally lags by a few seconds).
          sleep 5

          # Refresh in place. `npx skills update <name>` respects the entry
          # in skills-lock.json (source = DailybotHQ/ai-diff-reviewer) and
          # pulls the newest matching tag — which is the one we just pushed.
          echo "::group::npx skills update ai-diff-reviewer"
          npx --yes skills update ai-diff-reviewer
          echo "::endgroup::"

          if git diff --quiet -- .agents/skills/ai-diff-reviewer skills-lock.json; then
            echo "Vendored ai-diff-reviewer already at ${NEW_VERSION}; nothing to sync."
            exit 0
          fi

          git add .agents/skills/ai-diff-reviewer skills-lock.json
          git commit -m "chore(release): dogfood vendored ai-diff-reviewer to ${NEW_VERSION} [skip release]"
          git push origin HEAD:main

      - name: Step 4 - 📋 Generate release notes
        id: notes
        if: steps.version.outputs.skip == 'false'
        run: |
          set -euo pipefail
          PREV="${{ steps.version.outputs.previous_tag }}"
          NOTES=$(git log "${PREV}..${{ steps.version.outputs.new_version }}" --pretty=format:"- %s (%h)" 2>/dev/null || echo "")
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo ""
            echo "**Full changelog:** [\`${PREV}...${{ steps.version.outputs.new_version }}\`](https://github.com/${{ github.repository }}/compare/${PREV}...${{ steps.version.outputs.new_version }})"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Step 5 - 🚀 Create GitHub Release
        if: steps.version.outputs.skip == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: ${{ steps.version.outputs.new_version }}
          body: ${{ steps.notes.outputs.notes }}
          token: ${{ secrets.AUTOMATION_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
